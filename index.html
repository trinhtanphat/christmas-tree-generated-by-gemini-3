<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Magical Christmas Tree Gallery</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02040c;font-family:Arial,sans-serif;color:#fff}#tree{position:fixed;inset:0;width:100%;height:100%;border:0;z-index:1;pointer-events:none}.dream{position:fixed;inset:0;z-index:10;pointer-events:none;background:radial-gradient(circle at 50% 45%,#6f91ff18,transparent 48%)}.dream:before{content:"";position:absolute;inset:-20%;background-image:radial-gradient(circle,#fff9 0 1px,transparent 2px);background-size:80px 80px;opacity:.13;animation:drift 20s linear infinite}@keyframes drift{to{transform:translate(80px,-100px)}}
#gallery{position:fixed;inset:0;z-index:40;display:flex;align-items:center;perspective:1800px;opacity:0;visibility:hidden;transition:.55s;pointer-events:none;overflow:hidden}#gallery.on{opacity:1;visibility:visible}#strip{display:flex;align-items:center;gap:70px;width:max-content;transform-style:preserve-3d;transition:transform .14s ease-out}.card{position:relative;flex:none;height:clamp(430px,64vh,720px);max-width:82vw;padding:10px;border-radius:24px;background:linear-gradient(135deg,#fff0ad,#b9dcff,#ffb5d6);box-shadow:0 0 35px #ffe49fe8,0 0 100px #78adffb5,0 28px 80px #000d;animation:float 5s ease-in-out infinite;isolation:isolate}.card:before{content:"";position:absolute;inset:-35px;border-radius:46px;background:radial-gradient(ellipse,#ffe8a88a,#9fc7ff44 45%,transparent 73%);filter:blur(24px);z-index:-1;animation:pulse 2.8s ease-in-out infinite}.card:after{content:"";position:absolute;inset:10px;border-radius:16px;background:linear-gradient(110deg,transparent 28%,#ffffffc7 46%,transparent 62%);transform:translateX(-145%);mix-blend-mode:screen;animation:shine 4s ease-in-out infinite}.card img{display:block;width:auto;height:100%;max-width:100%;object-fit:contain;border-radius:16px;background:#0006}.spark{position:absolute;width:11px;height:11px;border-radius:50%;background:#fff;box-shadow:0 0 10px #fff,0 0 25px #ffe29a;animation:twinkle var(--d) ease-in-out infinite;animation-delay:var(--a)}@keyframes float{50%{transform:translateY(-18px)}}@keyframes pulse{50%{opacity:1;transform:scale(1.06)}}@keyframes shine{0%,55%{transform:translateX(-145%)}85%,100%{transform:translateX(145%)}}@keyframes twinkle{0%,100%{opacity:.1;transform:scale(.3)}50%{opacity:1;transform:scale(1.6)}}
#cam{position:fixed;right:20px;bottom:20px;z-index:70;width:min(31vw,370px);aspect-ratio:4/3;border:2px solid #ffe8a8;border-radius:20px;overflow:hidden;background:#050713;box-shadow:0 0 25px #ffe39ad9,0 0 60px #7eb0ff88;opacity:0;visibility:hidden;transition:.4s}#cam.on{opacity:1;visibility:visible}#video{display:block;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}#camlabel{position:absolute;left:9px;bottom:9px;padding:5px 9px;border-radius:20px;background:#0009;font-size:11px}.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#41ef88;box-shadow:0 0 9px #41ef88;margin-right:6px}
#setup{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 50% 30%,#273b72d9,#02040cf8 65%);backdrop-filter:blur(10px);transition:.45s}#setup.hide{opacity:0;visibility:hidden;pointer-events:none}.panel{width:min(510px,94vw);padding:30px;border:1px solid #ffe29a66;border-radius:24px;background:#0a0e1deb;text-align:center;box-shadow:0 30px 100px #000c}.panel h1{margin:0 0 10px;color:#fff0b6;font-family:Georgia,serif}.panel p{color:#bdcae4;line-height:1.5}.pick,#start{display:block;width:100%;padding:15px;margin-top:12px;border-radius:14px;cursor:pointer}.pick{border:1px solid #ffe29a66;background:#ffffff0d;color:#ffe9a9}#folder{display:none}#start{border:0;background:linear-gradient(90deg,#f8d97e,#ffb8d8,#b9d9ff);color:#151522;font-weight:bold;font-size:16px}#status{min-height:20px;margin-top:12px;color:#cad8f2;font-size:13px}
#controls{position:fixed;left:18px;bottom:18px;z-index:75;display:flex;gap:9px;opacity:0;visibility:hidden;transition:.4s}#controls.on{opacity:1;visibility:visible}.btn{padding:10px 14px;border:1px solid #ffe6a86b;border-radius:30px;background:#050819b5;color:#fff0bb;backdrop-filter:blur(10px)}#hearts{position:fixed;inset:0;z-index:90;pointer-events:none;overflow:hidden}.heart{position:absolute;left:50%;top:52%;font-size:var(--s);filter:drop-shadow(0 0 14px #ff5c9f);animation:hfly var(--t) cubic-bezier(.15,.75,.2,1) forwards}@keyframes hfly{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(var(--r))}15%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(1.6) rotate(calc(var(--r) + 35deg))}}
#hint{position:fixed;left:50%;top:14px;z-index:80;transform:translateX(-50%);padding:9px 14px;border-radius:30px;background:#040712a8;border:1px solid #ffe4a844;color:#fff0c1;font-size:12px;opacity:0;transition:.4s;white-space:nowrap}#hint.on{opacity:1}@media(max-width:700px){.card{height:clamp(330px,54vh,540px)}#strip{gap:30px}#cam{width:min(44vw,240px);border-radius:14px}#hint{white-space:normal;width:92vw;text-align:center}}
</style></head><body>
<iframe id="tree" src="./圣诞树新.html"></iframe><div class="dream"></div><div id="gallery"><div id="strip"></div></div><div id="hearts"></div><div id="hint">Mở tay: hiện ảnh · Nắm tay: ẩn ảnh · Làm tim 1 hoặc 2 tay: thả tim</div>
<div id="cam"><video id="video" autoplay muted playsinline></video><div id="camlabel"><span class="dot"></span><span id="camtext">Camera đang hoạt động</span></div></div>
<div id="controls"><button class="btn" id="toggle">Hiện ảnh</button><button class="btn" id="love">Thả tim</button></div>
<div id="setup"><div class="panel"><h1>Magical Christmas Gallery</h1><p>Chọn thư mục ảnh. Ảnh sẽ hiển thị rất lớn phía trước cây thông và toàn bộ hiệu ứng.</p><label class="pick" for="folder" id="pick">Chọn thư mục ảnh</label><input id="folder" type="file" accept="image/*" multiple webkitdirectory directory><button id="start">Bật camera & bắt đầu</button><div id="status"></div></div></div>
<script type="module">
import{FilesetResolver,HandLandmarker}from'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm';
const $=id=>document.getElementById(id),tree=$('tree'),setup=$('setup'),start=$('start'),status=$('status'),folder=$('folder'),pick=$('pick'),gallery=$('gallery'),strip=$('strip'),cam=$('cam'),video=$('video'),camtext=$('camtext'),controls=$('controls'),toggle=$('toggle'),love=$('love'),hearts=$('hearts'),hint=$('hint');
let files=[],urls=[],tracker=null,visible=false,lastTime=-1,lastHeart=0,of=0,cf=0,hf=0,pan=0;
function hideOld(){try{let d=tree.contentDocument;if(!d)return;['system-loader','setup-screen','webcam-wrapper'].forEach(id=>{let e=d.getElementById(id);if(e)e.style.display='none'});let u=d.getElementById('ui-layer');if(u)u.style.opacity='.7'}catch(e){}}tree.addEventListener('load',()=>{hideOld();[250,700,1500,2800].forEach(t=>setTimeout(hideOld,t))});
folder.onchange=()=>{files=[...(folder.files||[])].filter(f=>f.type.startsWith('image/')||/\.(png|jpe?g|webp|gif|bmp|avif)$/i.test(f.name));pick.textContent=files.length?`${files.length} ảnh đã chọn${files.length>50?' · dùng 50 ảnh đầu':''}`:'Chọn thư mục ảnh'};
function sparkle(c){for(let i=0;i<18;i++){let s=document.createElement('i');s.className='spark';let side=i%4;if(side==0){s.style.left=Math.random()*100+'%';s.style.top=-8-Math.random()*18+'px'}if(side==1){s.style.right=-8-Math.random()*18+'px';s.style.top=Math.random()*100+'%'}if(side==2){s.style.left=Math.random()*100+'%';s.style.bottom=-8-Math.random()*18+'px'}if(side==3){s.style.left=-8-Math.random()*18+'px';s.style.top=Math.random()*100+'%'}s.style.setProperty('--d',1.2+Math.random()*2.2+'s');s.style.setProperty('--a',-Math.random()*3+'s');c.appendChild(s)}}
function build(){urls.forEach(URL.revokeObjectURL);urls=[];strip.replaceChildren();let a=files.slice(0,50);if(!a.length){let c=document.createElement('div');c.className='card';c.style.width='min(82vw,760px)';c.style.display='grid';c.style.placeItems='center';c.style.fontSize='clamp(24px,4vw,48px)';c.textContent='Hãy chọn thư mục ảnh';sparkle(c);strip.append(c)}a.forEach(f=>{let u=URL.createObjectURL(f);urls.push(u);let c=document.createElement('div');c.className='card';let im=new Image;im.src=u;im.alt=f.name;im.decoding='async';c.append(im);sparkle(c);strip.append(c)});requestAnimationFrame(center)}
function center(){let m=Math.max(0,strip.scrollWidth-innerWidth*.88),x=-m/2+pan*Math.min(m/2,innerWidth*.45);strip.style.transform=`translate3d(${x}px,0,180px)`}addEventListener('resize',center);function show(v){visible=v;gallery.classList.toggle('on',v);toggle.textContent=v?'Ẩn ảnh':'Hiện ảnh';if(v)center()}
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y,a.z-b.z),ext=(l,t,p)=>dist(l[t],l[0])>dist(l[p],l[0])*1.18;function open(l){let n=[[8,6],[12,10],[16,14],[20,18]].filter(x=>ext(l,...x)).length,s=[8,12,16,20].reduce((q,i)=>q+dist(l[i],l[0]),0)/4;return n>=4&&s>.28}function closed(l){return[[8,6],[12,10],[16,14],[20,18]].filter(x=>ext(l,...x)).length<=1}function oneHeart(l){return dist(l[4],l[8])<.058&&!ext(l,12,10)&&!ext(l,16,14)&&!ext(l,20,18)}function twoHeart(a,b){return dist(a[8],b[8])<.17&&dist(a[4],b[4])<.17&&dist(a[0],b[0])>.12&&dist(a[0],b[0])<.75&&dist(a[9],b[9])<.58}
function burst(k=1){let now=performance.now();if(now-lastHeart<900)return;lastHeart=now;let sym=['❤','♥','♡','💗','💖','💕'];for(let i=0;i<Math.round(24*k);i++){let h=document.createElement('b');h.className='heart';h.textContent=sym[Math.random()*sym.length|0];h.style.setProperty('--x',(Math.random()-.5)*innerWidth*.95+'px');h.style.setProperty('--y',-innerHeight*(.42+Math.random()*.55)+'px');h.style.setProperty('--r',(Math.random()-.5)*80+'deg');h.style.setProperty('--s',30+Math.random()*62+'px');h.style.setProperty('--t',2.1+Math.random()*1.9+'s');h.style.color=['#ff72aa','#ffb0ce','#ffd3e4','#fff0f7'][Math.random()*4|0];hearts.append(h);h.onanimationend=()=>h.remove()}}
async function initTracker(){try{let v=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm');tracker=await HandLandmarker.createFromOptions(v,{baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',delegate:'GPU'},runningMode:'VIDEO',numHands:2,minHandDetectionConfidence:.55,minHandPresenceConfidence:.5,minTrackingConfidence:.5});camtext.textContent='Camera + nhận diện tay'}catch(e){console.warn(e);camtext.textContent='Camera hoạt động · dùng nút bên trái'}}
function gestures(h){let o=h.some(open),c=h.length==1&&closed(h[0]),heart=h.some(oneHeart)||(h.length>1&&twoHeart(h[0],h[1]));of=o?of+1:0;cf=c?cf+1:0;hf=heart?hf+1:0;if(of==5)show(true);if(cf==5)show(false);if(hf==4)burst(h.length>1?1.5:1);if(h[0]){pan+=(((.5-h[0][9].x)*2)-pan)*.16;if(visible)center()}}
function loop(){if(video.readyState>=2&&video.currentTime!=lastTime){lastTime=video.currentTime;if(tracker)try{gestures(tracker.detectForVideo(video,performance.now()).landmarks||[])}catch(e){}}requestAnimationFrame(loop)}
start.onclick=async()=>{start.disabled=true;status.textContent='Đang chuẩn bị ảnh và camera…';build();try{let s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=s;await video.play();cam.classList.add('on');status.textContent='Camera đã bật';await initTracker()}catch(e){console.warn(e);status.textContent='Không bật được camera. Vẫn dùng được hai nút phía dưới.';camtext.textContent='Không có quyền camera'}setup.classList.add('hide');controls.classList.add('on');hint.classList.add('on');setTimeout(()=>hint.classList.remove('on'),6500);loop();start.disabled=false};toggle.onclick=()=>show(!visible);love.onclick=()=>burst(1.35);
</script></body></html>
